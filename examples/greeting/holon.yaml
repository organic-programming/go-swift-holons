# ── Identity ──────────────────────────────────────────
schema: holon/v0
uuid: "3c62ac3f-8b45-5068-b1bc-69d2c8fb0a06"
given_name: gudule
family_name: Greeting-Goswift
motto: Greets users in 56 languages — Go backend, SwiftUI frontend.
composer: B. ALTER
clade: deterministic/pure
status: draft
born: "2026-03-06"

# ── Lineage ───────────────────────────────────────────
parents: []
reproduction: manual
generated_by: manual

# ── Description ───────────────────────────────────────
description: |
  A composite Goswift holon: a Go gRPC daemon (greeting-daemon) paired
  with a SwiftUI app (greeting-swiftui). Together they form a single
  Apple-platform application family that greets users in 56 languages.
  On macOS the daemon is embedded and launched locally; on iOS, tvOS,
  watchOS, and visionOS the SwiftUI app connects to a reachable daemon
  over TCP.

# ── Operational ───────────────────────────────────────
kind: composite
build:
  runner: recipe
  defaults:
    target: macos
    mode: debug
  members:
    - id: daemon
      path: greeting-daemon
      type: holon
    - id: app
      path: greeting-swiftui
      type: component
  targets:
    macos:
      steps:
        - build_member: daemon
        - exec:
            cwd: greeting-swiftui
            argv: ["xcodebuild", "-scheme", "GreetingSwiftUI", "-configuration", "Debug", "-destination", "generic/platform=macOS", "-derivedDataPath", ".build/xcode/macos", "-clonedSourcePackagesDirPath", ".build/xcode/source-packages", "build"]
        - exec:
            cwd: .
            argv:
              - "bash"
              - "-lc"
              - |
                  set -euo pipefail
                  products_dir="greeting-swiftui/.build/xcode/macos/Build/Products/Debug"
                  app_dir="$products_dir/GreetingSwiftUI.app"
                  rm -rf "$app_dir"
                  mkdir -p "$app_dir/Contents/MacOS" "$app_dir/Contents/Resources" "$app_dir/Contents/lib"
                  cp "$products_dir/GreetingSwiftUI" "$app_dir/Contents/MacOS/GreetingSwiftUI"
                  cp "greeting-daemon/gudule-daemon-greeting-goswift" "$app_dir/Contents/MacOS/gudule-daemon-greeting-goswift"
                  shopt -s nullglob
                  for bundle in "$products_dir"/*.bundle; do
                    cp -R "$bundle" "$app_dir/Contents/Resources/"
                  done
                  if [ -d "$products_dir/PackageFrameworks" ]; then
                    cp -R "$products_dir/PackageFrameworks/." "$app_dir/Contents/lib/"
                  fi
                  cat > "$app_dir/Contents/Info.plist" <<'EOF'
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                    <key>CFBundleDevelopmentRegion</key>
                    <string>en</string>
                    <key>CFBundleDisplayName</key>
                    <string>GreetingSwiftUI</string>
                    <key>CFBundleExecutable</key>
                    <string>GreetingSwiftUI</string>
                    <key>CFBundleIdentifier</key>
                    <string>org.organicprogramming.greeting-swiftui-goswift</string>
                    <key>CFBundleInfoDictionaryVersion</key>
                    <string>6.0</string>
                    <key>CFBundleName</key>
                    <string>GreetingSwiftUI</string>
                    <key>CFBundlePackageType</key>
                    <string>APPL</string>
                    <key>CFBundleShortVersionString</key>
                    <string>1.0</string>
                    <key>CFBundleVersion</key>
                    <string>1</string>
                    <key>LSMinimumSystemVersion</key>
                    <string>15.0</string>
                    <key>NSHighResolutionCapable</key>
                    <true/>
                  </dict>
                  </plist>
                  EOF
                  codesign --force --deep --sign - "$app_dir"
        - assert_file:
            path: greeting-swiftui/.build/xcode/macos/Build/Products/Debug/GreetingSwiftUI.app/Contents/MacOS/GreetingSwiftUI
        - assert_file:
            path: greeting-swiftui/.build/xcode/macos/Build/Products/Debug/GreetingSwiftUI.app/Contents/MacOS/gudule-daemon-greeting-goswift
        - assert_file:
            path: greeting-swiftui/.build/xcode/macos/Build/Products/Debug/GreetingSwiftUI.app/Contents/Info.plist
        - assert_file:
            path: greeting-swiftui/.build/xcode/macos/Build/Products/Debug/GreetingSwiftUI.app/Contents/_CodeSignature/CodeResources
        - assert_file:
            path: greeting-swiftui/.build/xcode/macos/Build/Products/Debug/GreetingSwiftUI.app
    ios:
      steps:
        - exec:
            cwd: greeting-swiftui
            argv: ["xcodebuild", "-scheme", "GreetingSwiftUI", "-configuration", "Debug", "-destination", "generic/platform=iOS", "-derivedDataPath", ".build/xcode/ios", "-clonedSourcePackagesDirPath", ".build/xcode/source-packages", "build"]
        - assert_file:
            path: greeting-swiftui/.build/xcode/ios/Build/Products/Debug-iphoneos/GreetingSwiftUI
    ios-simulator:
      steps:
        - exec:
            cwd: greeting-swiftui
            argv: ["xcodebuild", "-scheme", "GreetingSwiftUI", "-configuration", "Debug", "-destination", "generic/platform=iOS Simulator", "-derivedDataPath", ".build/xcode/ios-simulator", "-clonedSourcePackagesDirPath", ".build/xcode/source-packages", "build"]
        - assert_file:
            path: greeting-swiftui/.build/xcode/ios-simulator/Build/Products/Debug-iphonesimulator/GreetingSwiftUI
        - exec:
            cwd: .
            argv: ["bash", "scripts/package_ios_simulator_app.sh", "greeting-swiftui/.build/xcode/ios-simulator/Build/Products/Debug-iphonesimulator", "GreetingSwiftUI", "org.organicprogramming.greeting-swiftui", "18.0"]
        - assert_file:
            path: greeting-swiftui/.build/xcode/ios-simulator/Build/Products/Debug-iphonesimulator/GreetingSwiftUI.app
    tvos:
      steps:
        - exec:
            cwd: greeting-swiftui
            argv: ["xcodebuild", "-scheme", "GreetingSwiftUI", "-configuration", "Debug", "-destination", "generic/platform=tvOS", "-derivedDataPath", ".build/xcode/tvos", "-clonedSourcePackagesDirPath", ".build/xcode/source-packages", "build"]
        - assert_file:
            path: greeting-swiftui/.build/xcode/tvos/Build/Products/Debug-appletvos/GreetingSwiftUI
    watchos:
      steps:
        - exec:
            cwd: greeting-swiftui
            argv: ["xcodebuild", "-scheme", "GreetingSwiftUI", "-configuration", "Debug", "-destination", "generic/platform=watchOS", "-derivedDataPath", ".build/xcode/watchos", "-clonedSourcePackagesDirPath", ".build/xcode/source-packages", "build"]
        - assert_file:
            path: greeting-swiftui/.build/xcode/watchos/Build/Products/Debug-watchos/GreetingSwiftUI
    visionos:
      steps:
        - exec:
            cwd: greeting-swiftui
            argv: ["xcodebuild", "-scheme", "GreetingSwiftUI", "-configuration", "Debug", "-destination", "generic/platform=visionOS", "-derivedDataPath", ".build/xcode/visionos", "-clonedSourcePackagesDirPath", ".build/xcode/source-packages", "build"]
        - assert_file:
            path: greeting-swiftui/.build/xcode/visionos/Build/Products/Debug-xros/GreetingSwiftUI
requires:
  commands: [bash, codesign, go, xcodebuild]
  files: [greeting-daemon/go.mod, greeting-swiftui/Package.swift]
platforms: [macos, ios, ios-simulator, tvos, watchos, visionos]
artifacts:
  primary: greeting-swiftui/.build/xcode/macos/Build/Products/Debug/GreetingSwiftUI.app
